name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.8
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: >
          flutter build apk --debug
          --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL || 'https://nbdoveppvfdygeddwcey.supabase.co' }}
          --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ vars.SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_XemzjySUsIR0eEF06LyMFw_TkWKJSKl' }}
          --dart-define=AGGREGATOR_API_BASE_URL=${{ vars.AGGREGATOR_API_BASE_URL || 'https://demo-aggregator.invalid' }}
          --dart-define=AGGREGATOR_API_TOKEN=${{ secrets.AGGREGATOR_API_TOKEN || 'demo_token' }}
          --dart-define=AGGREGATOR_SMS_NUMBER=${{ vars.AGGREGATOR_SMS_NUMBER || '770000000' }}
          --dart-define=WHATSAPP_SUPPORT_NUMBER=${{ vars.WHATSAPP_SUPPORT_NUMBER || '967770000000' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: barq-recharge-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
